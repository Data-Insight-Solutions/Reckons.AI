<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 156 120" fill="none" role="img" aria-label="Data Insight Solutions — synapse mark">
<!-- DIS Synapse mark — imported from the Claude Design project "Data Insight Solutions animated logo"
     (DIS Synapse Logo.dc.html). Self-contained: keyframes embedded so the mark works via <img>. -->
<style>
  @keyframes d{from{stroke-dashoffset:100}to{stroke-dashoffset:0}}
  @keyframes sp{0%{stroke-dashoffset:100}100%{stroke-dashoffset:0}}
  @keyframes po{0%{opacity:0;transform:scale(0)}100%{opacity:1;transform:scale(1)}}
  @keyframes br{0%,100%{opacity:.12;transform:scale(.7)}50%{opacity:.42;transform:scale(1.5)}}
  @keyframes tr{0%{opacity:0;stroke-dashoffset:100}18%{opacity:1;stroke-dashoffset:0}52%{opacity:1;stroke-dashoffset:0}76%{opacity:0;stroke-dashoffset:0}100%{opacity:0;stroke-dashoffset:0}}
  .halo circle,.core circle{transform-box:fill-box;transform-origin:center}
  @media (prefers-reduced-motion: reduce){
    line{animation:none !important;stroke-dashoffset:0 !important}
    .net line{opacity:.38 !important}
    .core circle{animation:none !important;opacity:1 !important}
    .halo circle{animation:none !important;opacity:.25 !important}
  }
</style>
<g class="net" stroke="#4f8fe0" stroke-width="1.4" stroke-linecap="round" opacity="0.38"><line x1="56" y1="60" x2="80" y2="24" pathLength="100" style="stroke-dasharray:100;stroke-dashoffset:100;animation:tr 5.2s ease-in-out infinite;animation-delay:0s"/><line x1="56" y1="60" x2="80" y2="96" pathLength="100" style="stroke-dasharray:100;stroke-dashoffset:100;animation:tr 6.1s ease-in-out infinite;animation-delay:1.4s"/><line x1="80" y1="24" x2="104" y2="40" pathLength="100" style="stroke-dasharray:100;stroke-dashoffset:100;animation:tr 4.8s ease-in-out infinite;animation-delay:2.6s"/><line x1="80" y1="96" x2="104" y2="88" pathLength="100" style="stroke-dasharray:100;stroke-dashoffset:100;animation:tr 5.6s ease-in-out infinite;animation-delay:0.8s"/><line x1="56" y1="60" x2="120" y2="60" pathLength="100" style="stroke-dasharray:100;stroke-dashoffset:100;animation:tr 6.8s ease-in-out infinite;animation-delay:3.2s"/></g>
