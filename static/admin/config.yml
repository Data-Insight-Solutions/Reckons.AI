# Sveltia CMS configuration for the Reckons.AI graph-authored docs site (F27).
#
# Graph-first: the graph/TTL + Reckoning is the primary authoring surface and
# content/*.md is a generated, trailing by-product. This CMS is a secondary,
# convenient editor whose commits round-trip back into the graph. Field schema
# mirrors src/lib/publish/site-export.ts (pageToMarkdown / sveltiaConfig).

backend:
  name: github
  repo: Data-Insight-Solutions/Reckons.AI
  branch: main
  # OAuth handled by sveltia-cms-auth — the Cloudflare Worker
  # `reckons-sveltia-cms-auth`, mapped to admin.reckons.ai. sveltia-cms-auth
  # serves /auth and /callback there. The GitHub OAuth App's callback must be
  # https://admin.reckons.ai/callback. See kb:sveltia-cms-setup in the roadmap KB.
  base_url: https://admin.reckons.ai

# Uploaded images/assets are embeddable in page bodies (markdown widget).
media_folder: static/media
public_folder: /media

# Local editing without deploying the OAuth worker: Sveltia CMS has NO proxy-
# server backend (unlike Decap/Netlify CMS — @sveltia/cms-proxy-server does not
# exist) and does not read a `local_backend` option; both are Decap-only and
# silently ignored here. Instead, on localhost the CMS auto-offers "Work with
# Local Repository", which uses the browser's File System Access API to edit a
# real git checkout directly (Chromium-family browsers only) — no config
# change needed. See kb:sveltia-cms-setup in the roadmap KB.

collections:
  - name: pages
    label: Pages
    label_singular: Page
    description: >-
      WebPage nodes published from the graph. Edits here are proposed back into
      the graph (see the markdown alignment check).
    folder: content
    create: true
    # Sveltia does NOT implement Decap/Netlify's `nested` collection option (it's
    # tracked for a future 2.0 release) — `nested: { depth: 4 }` was silently
    # ignored, so the collection fell back to scanning only the immediate
    # `content/` folder and found zero entries (both pages live one level down,
    # in content/docs/ and content/releases/). `path` is the option Sveltia DOES
    # support: it recursively discovers existing files matching the template and
    # is also used to place new entries, with no per-entry index file required.
    # The `slugify` filter mirrors contentPath()'s `slugify(page.section)` in
    # src/lib/publish/site-export.ts so the folder segment matches on disk
    # (e.g. section "Docs" -> content/docs/, not content/Docs/). Root-level pages
    # (no section) aren't produced by site-export today, so they're out of scope
    # for this template — see kb:sveltia-cms-setup in the roadmap KB.
    path: '{{fields.section | slugify}}/{{fields.slug}}'
    identifier_field: slug
    summary: '{{fields.title}}  ·  {{fields.status}}'
    fields:
      - { name: title, label: Title, widget: string }
      - { name: slug, label: Slug, widget: string, hint: URL path segment, e.g. getting-started }
      - { name: order, label: Order, widget: number, default: 0, value_type: int, hint: Position within its section/parent }
      - { name: section, label: Section, widget: string, required: false, hint: Top-level nav group, e.g. Docs }
      - { name: parent, label: Parent slug, widget: string, required: false, hint: Slug of the parent page (site tree) }
      - { name: template, label: Template, widget: select, options: [landing, doc, full, sidebar, post], default: doc }
      - { name: status, label: Status, widget: select, options: [draft, published, unlisted], default: draft }
      - { name: nav, label: Nav placement, widget: select, options: [menu, sidebar, both, hidden], default: sidebar }
      - { name: date, label: Date, widget: datetime, format: "YYYY-MM-DD", time_format: false, required: false, hint: "Posts only — release notes/announcements/blog publish date" }
      - { name: excerpt, label: Excerpt, widget: text, required: false, hint: Short summary (mirrors page:excerpt in the graph) }
      - { name: body, label: Body, widget: markdown }
