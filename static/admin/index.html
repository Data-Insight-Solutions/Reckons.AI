<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>Reckons.AI — Content Manager</title>
    <!--
      Sveltia CMS content manager for the graph-authored docs site (F27).
      Loads the EXTERNAL, un-forked Sveltia bundle from CDN — never vendored here.
      Thanks to the Sveltia project: https://github.com/sveltia/sveltia-cms
      (please consider sponsoring). Config lives in ./config.yml.

      This is a standalone document (not the SvelteKit app shell), so the app's
      strict CSP does not apply here; Sveltia reaches the GitHub API and the
      sveltia-cms-auth OAuth worker directly.

      Version-pinned to the current stable @sveltia/cms release (checked
      against npm on 2026-07-01) rather than an unpinned "latest" alias, so a
      new Sveltia release can't silently break /admin. Bump the version number
      deliberately when upgrading.
    -->
  </head>
  <body>
    <!--
      Per-environment edit routing (F48). Production (reckons.ai / the pages.dev
      apex) is left COMPLETELY untouched: Sveltia auto-initialises from
      config.yml (branch: main) exactly as before, so any manual-init quirk can
      only ever affect the dev admin. Only the dev branch alias and hashed
      preview subdomains (*.reckons-ai.pages.dev) switch the commit target to the
      `dev` branch, keeping CMS edits made while testing off of production main.
    -->
    <script>
      // Which branch should /admin on THIS host commit to. Pure + testable.
      // Returns null when production should be left to auto-init untouched.
      function reckonsAdminBranch(hostname) {
        // Subdomains of reckons-ai.pages.dev (dev alias + preview hashes) — but
        // NOT the apex (that tracks production/main) and NOT reckons.ai.
        if (/\.reckons-ai\.pages\.dev$/.test(hostname)) return 'dev';
        return null; // production: no override
      }
      if (reckonsAdminBranch(location.hostname)) {
        window.CMS_MANUAL_INIT = true;
      }
    </script>
    <!--
      SUBRESOURCE INTEGRITY IS NOT OPTIONAL HERE.

      This page holds a GitHub OAuth token with write access to this repository, and
      production deploys from `main`. A CDN that served different bytes than it promised
      would therefore have a path to production — and version-pinning does NOT prevent that.
      Pinning defends against an ACCIDENTAL breaking release; it is no defence at all
      against a compromised or hijacked CDN response, which is free to return anything it
      likes under the same URL.

      The hash below was verified byte-for-byte against the npm-published artifact
      (registry.npmjs.org/@sveltia/cms/-/cms-0.169.1.tgz) on 2026-07-14, so it pins the
      real release rather than whatever the CDN happened to hand us. crossorigin is
      required for the browser to check integrity on a cross-origin script.

      When bumping the version, RECOMPUTE the hash from the npm tarball — never from the
      CDN alone, or you will faithfully pin an attacker's bytes.
    -->
    <script
      src="https://cdn.jsdelivr.net/npm/@sveltia/cms@0.169.1/dist/sveltia-cms.js"
      integrity="sha384-bZPXv5iCz/2JNwBehhFWqz6qWmJ0z9GrJYbWpm9S/YYviAs5yLypyxUp+U8ps7DP"
      crossorigin="anonymous"
    ></script>
    <script>
      // Only the dev/preview path took manual control; production already
      // auto-inited above. Keep everything from config.yml (load_config_file)
      // and override only the commit branch.
      (function () {
        if (!window.CMS_MANUAL_INIT) return;
        var branch = reckonsAdminBranch(location.hostname);
        window.CMS.init({ config: { load_config_file: true, backend: { branch: branch } } });
      })();
    </script>
  </body>
</html>
