name: CI

on:
  push:
    branches: [main, staging, dev]
  pull_request:
    branches: [main, staging, dev]

# onnxruntime-node's postinstall downloads optional native binaries from a CDN
# that intermittently times out in CI (ETIMEDOUT). The app uses onnxruntime-web
# (WASM) + a Vite stub, never the node build, and its CPU binary ships bundled —
# so skip that download. The install script reads this env var directly, which
# avoids the npm "unknown config" warning an .npmrc key would emit.
env:
  ONNXRUNTIME_NODE_INSTALL: skip

jobs:
  check:
    name: Type check + Unit tests + Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm run test:run
      - run: npm run build

  e2e:
    name: E2E (Desktop Chrome)
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
      - uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  smoke:
    name: Deploy Gate — Graph Render Smoke (Production Build)
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      # Builds a MINIFIED production bundle (mock backends) and runs
      # tests/e2e/graph-render.test.ts against `vite preview` of that build.
      # This is the gate that would have caught the "black graph" production
      # bug (PR #21) — the bug only reproduced post-minification and never
      # showed up under `vite dev`, which is what the `e2e` job above uses.
      - run: npm run test:e2e:smoke
      - uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: playwright-report-smoke
          path: playwright-report-smoke/
          retention-days: 7
