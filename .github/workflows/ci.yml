name: CI

on:
  push:
    branches: [main, staging, dev]
  pull_request:
    branches: [main, staging, dev]

# onnxruntime-node's postinstall downloads optional native binaries from a CDN
# that intermittently times out in CI (ETIMEDOUT). The app uses onnxruntime-web
# (WASM) + a Vite stub, never the node build, and its CPU binary ships bundled —
# so skip that download. The install script reads this env var directly, which
# avoids the npm "unknown config" warning an .npmrc key would emit.
env:
  ONNXRUNTIME_NODE_INSTALL: skip

jobs:
  check:
    name: Type check + Unit tests + Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm run test:run
      # F107.5: fail if a provider secret is set to inline into the public bundle at build.
      - run: npm run secret:scan
      - run: npm run build
      # Narrow, deterministic, sub-second: is this ACTUALLY a production build?
      # On 2026-07-14 a stray NODE_ENV=development made `vite build` emit a DEV build with
      # import('/@vite/client') in index.html. It broke the deploy-gate smoke test — and,
      # worse, meant no local build was ever minified, so the one gate guarding a
      # minification-only crash was running against an unminifiable artifact.
      # This is a rule, not a judgment, so it is script tier and it BLOCKS.
      - run: npm run build:verify
      # THE PREMISE: update the graph, and the changes follow. That is only true if it is
      # ENFORCED. Every generator (docs pages, landing features, landing principles) already
      # had a --check mode, and not one of them gated anything — md-align even ran with
      # continue-on-error, "a hygiene signal, not a gate". So "our site is generated from our
      # graph" was itself an unverified claim, made by the party it benefits.
      #
      # It had already rotted: landing-features.ts was HARD BROKEN (it scooped up the thesis
      # tenets and refused to run), so the landing page could not be regenerated from the
      # graph at all — and nothing said so.
      #
      # Decidable by a rule, so it blocks.
      - run: npm run align

  mcp:
    name: MCP server (build + tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: mcp-server/package-lock.json
      # The MCP server is a separate package. Its suite covers the local-code-execution boundary
      # (git-utils command-injection), tool-argument validation, and graph parse/deletion health
      # — F107.1 guarantees that must not silently regress. `npm test` builds, then runs vitest and
      # the node --test reader suite.
      - name: Install and test MCP server
        working-directory: mcp-server
        run: |
          npm ci
          npm test

  script-tier:
    name: Script tier (F74.3 — deterministic, zero tokens)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # alignment-sweep diffs against a ref
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      # BLOCKING, as of 2026-07-14. kb:tier-script always claimed these "run in CI and fail
      # loudly". They ran nowhere at all, so the claim was false and the work fell to Opus at
      # cloud rates. Both halves are now true.
      #
      # This shipped ADVISORY for exactly one day, because published-graph-guard reported 166
      # "test-harness terms" in the published graph. That finding was WRONG: it banned
      # `urn:reckons:story/`, which is the product's own guided-story vocabulary, not test
      # debris. The graph was clean the whole time. An unverified finding kept a real gate
      # switched off — the product's own thesis, demonstrated at our expense.
      #
      # Only jobs marked blocking:true in jobs.json can fail the build (--ci). Everything else
      # still reports and queues findings without gating.
      - name: Run script tier (blocking on jobs marked blocking:true)
        run: npx tsx scripts/offline/run-all.ts --tier=script --ci
      - name: Upload findings
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: script-tier-findings
          path: reckons-workspace/knowledge.pending.jsonl
          retention-days: 14
          if-no-files-found: ignore

  e2e:
    name: E2E (Desktop Chrome)
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
      - uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  smoke:
    name: Deploy Gate — Graph Render Smoke (Production Build)
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      # Builds a MINIFIED production bundle (mock backends) and runs
      # tests/e2e/graph-render.test.ts against `vite preview` of that build.
      # This is the gate that would have caught the "black graph" production
      # bug (PR #21) — the bug only reproduced post-minification and never
      # showed up under `vite dev`, which is what the `e2e` job above uses.
      - run: npm run test:e2e:smoke
      - uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: playwright-report-smoke
          path: playwright-report-smoke/
          retention-days: 7
