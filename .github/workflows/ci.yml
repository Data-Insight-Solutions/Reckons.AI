name: CI

on:
  push:
    branches: [main, staging, dev]
  pull_request:
    branches: [main, staging, dev]

# onnxruntime-node's postinstall downloads optional native binaries from a CDN
# that intermittently times out in CI (ETIMEDOUT). The app uses onnxruntime-web
# (WASM) + a Vite stub, never the node build, and its CPU binary ships bundled —
# so skip that download. The install script reads this env var directly, which
# avoids the npm "unknown config" warning an .npmrc key would emit.
env:
  ONNXRUNTIME_NODE_INSTALL: skip

jobs:
  check:
    name: Type check + Unit tests + Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm run test:run
      - run: npm run build

  script-tier:
    name: Script tier (F74.3 — deterministic, zero tokens)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # alignment-sweep diffs against a ref
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      # ADVISORY, deliberately. kb:tier-script claims these "run in CI and fail loudly";
      # until now they ran nowhere, so the claim was false and the work fell to Opus at
      # cloud rates. This makes the first half true.
      #
      # The second half — failing loudly — is NOT on yet, and saying so is the point:
      # published-graph-guard is marked blocking:true in jobs.json and passes --ci here
      # only once static/knowledge.ttl is clean. It currently is not (166 test-harness
      # terms committed on dev), and a gate that is red the day it lands gets switched
      # off, after which it protects nothing. Swap `|| true` for `--ci` when the guard
      # goes green. See kb:tier-script-ci in reckons-roadmap.ttl.
      - name: Run script tier (advisory)
        run: npx tsx scripts/offline/run-all.ts --tier=script || true
      - name: Upload findings
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: script-tier-findings
          path: reckons-workspace/knowledge.pending.jsonl
          retention-days: 14
          if-no-files-found: ignore

  e2e:
    name: E2E (Desktop Chrome)
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
      - uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  smoke:
    name: Deploy Gate — Graph Render Smoke (Production Build)
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      # Builds a MINIFIED production bundle (mock backends) and runs
      # tests/e2e/graph-render.test.ts against `vite preview` of that build.
      # This is the gate that would have caught the "black graph" production
      # bug (PR #21) — the bug only reproduced post-minification and never
      # showed up under `vite dev`, which is what the `e2e` job above uses.
      - run: npm run test:e2e:smoke
      - uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: playwright-report-smoke
          path: playwright-report-smoke/
          retention-days: 7
