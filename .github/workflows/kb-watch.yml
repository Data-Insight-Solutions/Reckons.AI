name: KB Watch

on:
  push:
    branches: [main, staging, dev]
  pull_request:
    branches: [main, staging, dev]

permissions:
  contents: read
  pull-requests: write

jobs:
  alignment:
    name: KB Alignment Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 20  # Need history for git diff alignment scoring

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      # Build MCP server (kb-align.ts imports from it)
      - name: Build MCP server
        run: cd mcp-server && npm ci && npm run build

      # Setup workspace symlinks (kb-align reads from reckons-workspace/)
      - name: Setup Reckons workspace
        run: bash scripts/setup-reckons-workspace.sh

      # Run alignment check (skip E2E — that's in the main CI workflow)
      - name: KB Alignment
        id: align
        run: |
          set +e
          OUTPUT=$(npx tsx scripts/kb-align.ts --skip-e2e --dry-run --ref HEAD~5 2>&1)
          EXIT_CODE=$?
          echo "$OUTPUT"

          # Write output to step summary
          {
            echo '## KB Alignment Report'
            echo ''
            echo '```'
            echo "$OUTPUT"
            echo '```'
            echo ''
            if [ $EXIT_CODE -ne 0 ]; then
              echo '> **Drift detected** — KB entities may need updating.'
            else
              echo '> KB is aligned with current code.'
            fi
          } >> "$GITHUB_STEP_SUMMARY"

          # Store for PR comment
          EOF_MARKER=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "report<<$EOF_MARKER" >> "$GITHUB_OUTPUT"
          echo "$OUTPUT" >> "$GITHUB_OUTPUT"
          echo "$EOF_MARKER" >> "$GITHUB_OUTPUT"
          echo "exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"

      # Post alignment report as PR comment (PRs only)
      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const report = `${{ steps.align.outputs.report }}`;
            const exitCode = parseInt('${{ steps.align.outputs.exit_code }}');
            const status = exitCode === 0 ? 'aligned' : 'drift detected';
            const emoji = exitCode === 0 ? ':white_check_mark:' : ':warning:';

            const body = [
              `## ${emoji} KB Alignment: ${status}`,
              '',
              '```',
              report,
              '```',
              '',
              exitCode !== 0
                ? '> **Action needed**: Review the drift warnings and update TTL KBs if the changes are intentional.'
                : '> Code changes align with the knowledge base plan.',
              '',
              '*Generated by [KB Watch](.github/workflows/kb-watch.yml)*',
            ].join('\n');

            // Find existing comment to update
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c =>
              c.user?.login === 'github-actions[bot]' &&
              c.body?.includes('KB Alignment')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      # Snapshot for post-action comparison
      - name: Save alignment snapshot
        if: always()
        run: |
          npx tsx scripts/kb-snapshot.ts --output /tmp/kb-snapshot.json 2>/dev/null || true

      - name: Upload snapshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kb-snapshot
          path: /tmp/kb-snapshot.json
          retention-days: 30
