name: Reckons.AI Graph Alignment

on:
  push:
    branches: [main, staging, dev]
  pull_request:
    branches: [main, staging, dev]

permissions:
  contents: write  # docs KB regeneration commits content/ back to main (see "Commit regenerated docs pages")
  pull-requests: write

# See ci.yml: skip onnxruntime-node's flaky optional-binary download. Doing this
# via env (not .npmrc) also keeps npm silent — an npm warning here would leak
# backtick-containing text into the alignment PR-comment template literal below.
env:
  ONNXRUNTIME_NODE_INSTALL: skip

jobs:
  alignment:
    name: Reckons.AI Graph Alignment Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 20  # Need history for git diff alignment scoring

      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      # Docs KB pipeline (F27 Graph Publishing): static/starter-guide.ttl + static/docs-*.ttl
      # are the source of truth for the "generated" /docs sections (Guide, Features,
      # Triples & RDF, LLM, Use Cases, Integrations & Tech, Tips, Timeline & Ecosystem,
      # Architecture, Testing). scripts/docs-pages.ts turns those TTLs into
      # content/<section>/<slug>.md — idempotent, so re-running it when the KBs haven't
      # changed produces zero diff (that idempotency is what keeps the commit-back step
      # below from looping). Hand-authored content (content/docs/welcome.md,
      # content/releases/*) has no `generated: "docs-kb"` frontmatter tag and is never
      # touched by this script.
      - name: Regenerate docs pages from Docs KBs
        id: docs_pages
        run: |
          set +e
          OUTPUT=$(npx tsx scripts/docs-pages.ts 2>&1)
          EXIT_CODE=$?
          echo "$OUTPUT"
          DIFF=$(git status --porcelain content/)

          {
            echo '## Docs KB Pages Report'
            echo ''
            echo '```'
            echo "$OUTPUT"
            echo '```'
            if [ -n "$DIFF" ]; then
              echo ''
              echo '### Changed files'
              echo '```'
              echo "$DIFF"
              echo '```'
            fi
            echo ''
            if [ -z "$DIFF" ]; then
              echo '> `content/` already matches the docs KBs — nothing to regenerate.'
            elif [ "${{ github.event_name }}" = "pull_request" ]; then
              echo '> **Drift detected** — `content/` is out of sync with the docs KBs (`static/starter-guide.ttl` + `static/docs-*.ttl`). This regenerates automatically on merge to `main`; no action needed here unless the diff looks wrong.'
            else
              echo '> Regenerated `content/` from the docs KBs — committing the changes.'
            fi
          } >> "$GITHUB_STEP_SUMMARY"

          if [ -n "$DIFF" ]; then echo "changed=true" >> "$GITHUB_OUTPUT"; else echo "changed=false" >> "$GITHUB_OUTPUT"; fi
          exit $EXIT_CODE

      # Push the regeneration back to main only — never on PRs (forked PRs can't push,
      # and same-repo PRs shouldn't get surprise commits from CI). docs-pages.ts's
      # idempotency guarantees this commit itself regenerates to zero diff, so the
      # push it triggers doesn't loop.
      - name: Commit regenerated docs pages
        if: steps.docs_pages.outputs.changed == 'true' && github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/
          git commit -m "docs: regenerate content from docs KBs"
          git push

      # Markdown alignment (F27 Graph Publishing): content/*.md is a generated,
      # trailing by-product of the graph. This imports each committed file back
      # into WebPage statements and re-exports it, flagging any file whose
      # shape drifted from what the graph → site-export round trip produces.
      # Non-blocking (continue-on-error) — it's a hygiene signal, not a gate.
      - name: Markdown Alignment
        id: md_align
        continue-on-error: true
        run: |
          set +e
          OUTPUT=$(npx tsx scripts/md-align.ts 2>&1)
          EXIT_CODE=$?
          echo "$OUTPUT"

          {
            echo '## Markdown Alignment Report'
            echo ''
            echo '```'
            echo "$OUTPUT"
            echo '```'
            echo ''
            if [ $EXIT_CODE -ne 0 ]; then
              echo '> **Drift detected** — one or more `content/*.md` files no longer match the graph → site-export round trip. Re-export the affected pages and commit the result.'
            else
              echo '> `content/*.md` matches the graph-generated form.'
            fi
          } >> "$GITHUB_STEP_SUMMARY"

          exit $EXIT_CODE

      # Build MCP server (kb-align.ts imports from it)
      - name: Build MCP server
        run: cd mcp-server && npm ci && npm run build

      # Setup workspace symlinks (kb-align reads from reckons-workspace/)
      - name: Setup Reckons workspace
        run: bash scripts/setup-reckons-workspace.sh

      # Run alignment check (skip E2E — that's in the main CI workflow)
      - name: Graph Alignment
        id: align
        env:
          # Target branch (PR base, or the pushed branch) → environment for the
          # Graph review deep link. URLs overridable via repo variables.
          TARGET_REF: ${{ github.base_ref || github.ref_name }}
          APP_URL_MAIN: ${{ vars.APP_URL_MAIN }}
          APP_URL_STAGING: ${{ vars.APP_URL_STAGING }}
          APP_URL_DEV: ${{ vars.APP_URL_DEV }}
        run: |
          set +e
          OUTPUT=$(npx tsx scripts/kb-align.ts --skip-e2e --dry-run --ref HEAD~5 2>&1)
          EXIT_CODE=$?
          echo "$OUTPUT"

          # Resolve the graph review URL for the target environment.
          case "$TARGET_REF" in
            staging) REVIEW_BASE="${APP_URL_STAGING:-https://staging.reckons-ai.pages.dev}"; ENV_LABEL="Staging" ;;
            dev)     REVIEW_BASE="${APP_URL_DEV:-https://dev.reckons-ai.pages.dev}"; ENV_LABEL="Dev" ;;
            *)       REVIEW_BASE="${APP_URL_MAIN:-https://reckons.ai}"; ENV_LABEL="Production" ;;
          esac
          REVIEW_URL="${REVIEW_BASE}/review?tab=align"

          # Write output to step summary
          {
            echo '## Graph Alignment Report'
            echo ''
            echo '```'
            echo "$OUTPUT"
            echo '```'
            echo ''
            if [ $EXIT_CODE -ne 0 ]; then
              echo "> **Drift detected** — Graph entities may need updating. [Open the graph review → (${ENV_LABEL})](${REVIEW_URL})"
            else
              echo "> Graph is aligned with current code. [Open the graph review → (${ENV_LABEL})](${REVIEW_URL})"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

          # Store for PR comment
          EOF_MARKER=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "report<<$EOF_MARKER" >> "$GITHUB_OUTPUT"
          echo "$OUTPUT" >> "$GITHUB_OUTPUT"
          echo "$EOF_MARKER" >> "$GITHUB_OUTPUT"
          echo "exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"

      # Post alignment report as PR comment (PRs only)
      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v9
        env:
          # Per-environment app URLs, overridable via repo variables. Defaults:
          # main→production, staging/dev→Cloudflare Pages branch aliases.
          APP_URL_MAIN: ${{ vars.APP_URL_MAIN }}
          APP_URL_STAGING: ${{ vars.APP_URL_STAGING }}
          APP_URL_DEV: ${{ vars.APP_URL_DEV }}
        with:
          script: |
            const report = `${{ steps.align.outputs.report }}`;
            const exitCode = parseInt('${{ steps.align.outputs.exit_code }}');
            const status = exitCode === 0 ? 'aligned' : 'drift detected';
            const emoji = exitCode === 0 ? ':white_check_mark:' : ':warning:';

            // Deep-link to the graph review (Align tab) on the environment matching
            // this PR's base branch. The graph itself is local to the reviewer's
            // browser (IndexedDB), so the link just opens the review UI against it.
            const baseRef = context.payload.pull_request?.base?.ref || 'main';
            const envMap = {
              main:    { label: 'Production', url: process.env.APP_URL_MAIN    || 'https://reckons.ai' },
              staging: { label: 'Staging',    url: process.env.APP_URL_STAGING || 'https://staging.reckons-ai.pages.dev' },
              dev:     { label: 'Dev',        url: process.env.APP_URL_DEV     || 'https://dev.reckons-ai.pages.dev' },
            };
            const target = envMap[baseRef] || envMap.main;
            const reviewUrl = `${target.url}/review?tab=align`;

            const body = [
              `## ${emoji} Graph Alignment: ${status}`,
              '',
              '```',
              report,
              '```',
              '',
              exitCode !== 0
                ? `> **Action needed**: [Open the graph review → (${target.label})](${reviewUrl}) to reconcile the drift, then update the .ttl graph files if the changes are intentional.`
                : `> Code changes align with the graph plan. [Open the graph review → (${target.label})](${reviewUrl})`,
              '',
              '*Generated by [Reckons.AI Graph Alignment](.github/workflows/kb-watch.yml)*',
            ].join('\n');

            // Find existing comment to update
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c =>
              c.user?.login === 'github-actions[bot]' &&
              c.body?.includes('Alignment')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      # Snapshot for post-action comparison
      - name: Save alignment snapshot
        if: always()
        run: |
          npx tsx scripts/kb-snapshot.ts --output /tmp/kb-snapshot.json 2>/dev/null || true

      - name: Upload snapshot
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: kb-snapshot
          path: /tmp/kb-snapshot.json
          retention-days: 30
