name: Safety Attestation

# A recurring, dated record that Reckons.AI's good-faith safety controls exist and
# still pass — recorded against the app's own functionality, continuously, from an
# early date. The app has no server, no accounts, and no logs, so it can retain no
# evidence about any USER; what it can prove is what the SOFTWARE did. Committing the
# attestation gives that record what only git can: timestamped, ordered, and
# cryptographically chained, so it cannot be backdated.
#
# See COUNSEL-BRIEF.md and scripts/offline/safety-attestation.ts.

on:
  schedule:
    - cron: '17 6 * * 1' # every Monday — the record accrues whether or not anyone remembers
  push:
    branches: [main]
  pull_request:
    branches: [main, staging, dev]
  workflow_dispatch:

permissions:
  contents: write

env:
  ONNXRUNTIME_NODE_INSTALL: skip

jobs:
  attest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci

      # On PRs: report only. The egress-gate control legitimately FAILS today
      # (publishing ships ahead of F66 publish-safety-gate), and an honest attestation
      # must say so rather than be silenced. Flip continue-on-error off — making this a
      # hard gate — once F66 lands.
      - name: Verify safety controls
        id: verify
        continue-on-error: true
        run: npx tsx scripts/offline/safety-attestation.ts | tee /tmp/attest.txt

      - name: Step summary
        if: always()
        run: |
          {
            echo "## Safety attestation"
            echo '```'
            sed 's/\x1b\[[0-9;]*m//g' /tmp/attest.txt
            echo '```'
            echo "_Good-faith effort, not enforcement — controls are client-side, open-source, and bypassable by design (COUNSEL-BRIEF.md §4)._"
          } >> "$GITHUB_STEP_SUMMARY"

      # On main and on the weekly schedule: append the dated record and commit it.
      # The record is appended whether controls pass or fail — a log that only records
      # success is worthless as evidence.
      - name: Record attestation
        if: github.event_name == 'schedule' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
        run: npx tsx scripts/offline/safety-attestation.ts --record || true

      - name: Commit attestation
        if: github.event_name == 'schedule' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
        run: |
          if git diff --quiet static/reckons-safety-log.ttl; then
            echo "No change to the attestation log."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add static/reckons-safety-log.ttl
          git commit -m "chore(safety): recurring safety attestation $(date -u +%Y-%m-%d)"
          git push
